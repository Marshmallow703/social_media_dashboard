<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社媒发布看板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
  .app { max-width: 1020px; margin: 0 auto; padding: 24px 20px; }

  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header-left h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .header-left p { font-size: 13px; color: #888; margin-top: 3px; }
  .header-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { font-size: 13px; padding: 7px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; font-weight: 500; transition: all .15s; }
  .btn:hover { background: #f0efe9; border-color: #bbb; }
  .btn-accent { background: #534AB7; color: #fff; border-color: #534AB7; }
  .btn-accent:hover { background: #3C3489; border-color: #3C3489; }

  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #e5e3dc; }
  .tab { font-size: 13px; padding: 8px 16px; border: none; background: none; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: all .15s; }
  .tab.active { color: #534AB7; border-bottom-color: #534AB7; }
  .tab:hover { color: #534AB7; }

  .panel { display: none; }
  .panel.active { display: block; }

  .legend-wrap { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-group { display: flex; flex-direction: column; gap: 5px; }
  .legend-title { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: .4px; margin-bottom: 2px; text-transform: uppercase; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .matrix-outer { overflow-x: auto; background: #fff; border-radius: 12px; border: 1px solid #e5e3dc; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th { font-size: 12px; font-weight: 600; color: #555; padding: 12px 12px 10px; border-bottom: 1px solid #e5e3dc; background: #faf9f6; text-align: left; white-space: nowrap; vertical-align: bottom; }
  thead th:first-child { border-radius: 12px 0 0 0; width: 140px; }
  .col-head { display: flex; flex-direction: column; gap: 4px; }
  .col-plat { font-size: 12px; font-weight: 600; color: #333; }
  .role-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
  .role-review { background: #FCE7F3; color: #9D174D; }
  .role-post   { background: #FEF9C3; color: #854D0E; }
  .role-notify { background: #EDE9FE; color: #6D28D9; }

  tbody tr:last-child td { border-bottom: none; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid #f0efe9; vertical-align: top; }
  tbody td:first-child { font-size: 13px; font-weight: 600; color: #1a1a1a; white-space: nowrap; padding-top: 12px; }
  tbody tr:hover td { background: #faf9f6; }

  .cell { display: flex; flex-direction: column; gap: 4px; }
  .status-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; width: fit-content; }
  .status-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .s-prod   { background: #FAEEDA; color: #854F0B; }
  .s-review { background: #FBEAF0; color: #993556; }
  .s-ready  { background: #E6F1FB; color: #185FA5; }
  .s-pub    { background: #EAF3DE; color: #3B6D11; }
  .s-idea   { background: #EEEDFE; color: #534AB7; }
  .s-planning { background: #E1F5EE; color: #0F6E56; }
  .s-none   { background: #f0efe9; color: #bbb; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #fff; border: 1px solid #e5e3dc; border-radius: 10px; padding: 14px 16px; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a1a; }

  .snap-form { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .snap-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .form-row select, .form-row input[type=date] { flex: 1; min-width: 130px; font-size: 13px; padding: 7px 10px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; }
  textarea { width: 100%; font-size: 13px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; resize: vertical; min-height: 80px; line-height: 1.6; font-family: inherit; }
  textarea:focus, select:focus, input:focus { outline: none; border-color: #534AB7; box-shadow: 0 0 0 2px rgba(83,74,183,.1); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }

  .snap-card { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .snap-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .snap-date { font-size: 13px; font-weight: 600; }
  .snap-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: #EEEDFE; color: #534AB7; font-weight: 500; }
  .snap-body { font-size: 13px; color: #444; line-height: 1.7; white-space: pre-wrap; margin-bottom: 10px; }
  .snap-stats { display: flex; gap: 14px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid #f0efe9; font-size: 12px; color: #888; }
  .snap-stats strong { color: #1a1a1a; font-weight: 600; }
  .snap-del { font-size: 11px; color: #ccc; cursor: pointer; border: none; background: none; padding: 2px 4px; }
  .snap-del:hover { color: #e24b4a; }

  .empty-state { text-align: center; padding: 40px 20px; color: #aaa; font-size: 14px; }
  .loading { text-align: center; padding: 30px; color: #888; font-size: 13px; }
  .error-bar { background: #FCEBEB; border: 1px solid #F09595; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #A32D2D; margin-bottom: 16px; line-height: 1.6; }
  .add-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 14px; border: 1px dashed #ccc; border-radius: 12px; background: none; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 10px; }
  .add-btn:hover { background: #fff; border-color: #534AB7; color: #534AB7; }

  .zz-section { margin-top: 20px; background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; overflow: hidden; }
  .zz-group-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 0.5px solid #f0efe9; background: #faf9f6; }
  .zz-group-title { font-size: 12px; font-weight: 600; color: #555; }
  .zz-count { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .zz-count-post { background: #FEF9C3; color: #854D0E; }
  .zz-count-review { background: #FCE7F3; color: #9D174D; }
  .zz-count-approve { background: #EDE9FE; color: #6D28D9; }
  .zz-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid #f5f4f0; }
  .zz-item:last-child { border-bottom: none; }
  .zz-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #ccc; flex-shrink: 0; cursor: pointer; accent-color: #534AB7; }
  .zz-item-text { font-size: 13px; color: #1a1a1a; flex: 1; }
  .zz-plat { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }
  .zz-plat-post { background: #FEF9C3; color: #854D0E; }
  .zz-plat-review { background: #FCE7F3; color: #9D174D; }
  .zz-plat-approve { background: #EDE9FE; color: #6D28D9; }
  .zz-empty { padding: 20px 16px; font-size: 13px; color: #aaa; text-align: center; }
  .zz-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 8px; }
  .zz-header-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  .zz-header-sub { font-size: 12px; color: #aaa; }

  @media(max-width:600px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>社媒发布看板</h1>
      <p id="sync-time">正在加载 Asana 数据...</p>
    </div>
    <div class="header-right">
      <button class="btn" onclick="loadAsana()">↻ 刷新</button>
      <button class="btn btn-accent" onclick="openSnapForm()">+ 记录快照</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('matrix')">平台矩阵</button>
    <button class="tab" onclick="switchTab('history')">历史快照</button>
  </div>

  <div id="panel-matrix" class="panel active">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">总任务</div><div class="stat-val" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">已发布</div><div class="stat-val" id="stat-pub" style="color:#3B6D11">—</div></div>
      <div class="stat-card"><div class="stat-label">待 review</div><div class="stat-val" id="stat-review" style="color:#993556">—</div></div>
      <div class="stat-card"><div class="stat-label">制作中</div><div class="stat-val" id="stat-prod" style="color:#854F0B">—</div></div>
      <div class="stat-card"><div class="stat-label">计划中</div><div class="stat-val" id="stat-planning" style="color:#0F6E56">—</div></div>
      <div class="stat-card"><div class="stat-label">竹子老师待处理</div><div class="stat-val" id="stat-zz" style="color:#854D0E">—</div></div>
    </div>

    <div class="legend-wrap">
      <div class="legend-group">
        <div class="legend-title">进度状态</div>
        <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>制作中</div>
        <div class="leg"><div class="leg-dot" style="background:#D4537E"></div>待 review</div>
        <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>待发布</div>
        <div class="leg"><div class="leg-dot" style="background:#639922"></div>已发布</div>
        <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>计划中</div>
      </div>
      <div class="legend-group">
        <div class="legend-title">竹子老师操作</div>
        <div class="leg"><span class="role-badge role-review">需 review</span> 发内容给竹子老师审核</div>
        <div class="leg"><span class="role-badge role-post">竹子老师发送</span> 朋友圈内容发给竹子老师发布</div>
        <div class="leg"><span class="role-badge role-notify">竹子老师 approve</span> Instagram 发前需竹子老师 approve</div>
      </div>
    </div>

    <div id="matrix-wrap"><div class="loading">正在拉取 Asana 数据...</div></div>
    <div id="zz-checklist"></div>
  </div>

  <div id="panel-history" class="panel">
    <div id="snap-form-wrap" style="display:none">
      <div class="snap-form">
        <h3>记录快照</h3>
        <div class="form-row">
          <select id="snap-type">
            <option value="daily">日报</option>
            <option value="weekly" selected>周报</option>
            <option value="monthly">月报</option>
          </select>
          <input type="date" id="snap-date">
        </div>
        <textarea id="snap-text" placeholder="本周进度总结、待跟进事项、给竹子老师的备注...&#10;&#10;例：&#10;- 竹笋大会2025 公众号文章已发竹子老师 review，等待反馈&#10;- 朋友圈内容已准备好，请竹子老师发布&#10;- LinkedIn 图片顺序截图已发送确认"></textarea>
        <div class="form-actions">
          <button class="btn" onclick="closeSnapForm()">取消</button>
          <button class="btn btn-accent" onclick="saveSnapshot()">保存快照</button>
        </div>
      </div>
    </div>
    <div id="history-wrap"><div class="loading">加载历史记录...</div></div>
  </div>
</div>

<script>
const TOKEN = '2/1213206456523818/1214408896515501:c604a361d88c9de948a7dcfd4ff74be8';
const PROJECT_ID = '1214406810351207';
const PLATFORMS = ['小红书','公众号','朋友圈','视频号','LinkedIn','Instagram'];
const PLATFORM_META = {
  '小红书':    { zzRole: 'review' },
  '公众号':    { zzRole: 'review' },
  '朋友圈':    { zzRole: 'post'   },
  '视频号':    { zzRole: 'review' },
  'LinkedIn':  { zzRole: 'review' },
  'Instagram': { zzRole: 'approve' },
};
const SECTION_STATUS = {
  '📌 Topics（父任务区）': 'idea',
  '📋 Planning':           'planning',
  '🔨 In Production':      'prod',
  '👀 Pending Review':     'review',
  '✅ Ready to Publish':   'ready',
  '🚀 Published':          'pub',
};
const STATUS_LABEL = { prod:'制作中', review:'待 review', ready:'待发布', pub:'已发布', idea:'idea', planning:'计划中' };
const STATUS_CLASS = { prod:'s-prod', review:'s-review', ready:'s-ready', pub:'s-pub', idea:'s-idea', planning:'s-planning' };

let matrix = {};
let currentStats = { total:0, pub:0, review:0, prod:0, zz:0 };

function asanaFetch(path) {
  return fetch('https://app.asana.com/api/1.0' + path, {
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/json' }
  }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
}

async function loadAsana() {
  document.getElementById('matrix-wrap').innerHTML = '<div class="loading">正在拉取 Asana 数据...</div>';
  document.getElementById('sync-time').textContent = '正在同步...';
  try {
    const secResp = await asanaFetch(`/projects/${PROJECT_ID}/sections?opt_fields=name,gid`);
    const sections = secResp.data || [];
    const allTasks = [];
    for (const sec of sections) {
      const status = SECTION_STATUS[sec.name];
      if (!status || status === 'idea') continue;
      const tResp = await asanaFetch(`/sections/${sec.gid}/tasks?opt_fields=name,completed&limit=100`);
      (tResp.data || []).filter(t => !t.completed).forEach(t => allTasks.push({ name: t.name, status }));
    }
    matrix = buildMatrix(allTasks);
    renderMatrix();
    renderZZChecklist();
    updateStats();
    document.getElementById('sync-time').textContent = '最后同步：' + new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    saveCache(allTasks);
  } catch(e) {
    const cached = loadCache();
    if (cached.length) {
      matrix = buildMatrix(cached);
      renderMatrix();
      renderZZChecklist();
      updateStats();
      document.getElementById('sync-time').textContent = '已加载缓存（网络错误）';
    } else {
      document.getElementById('matrix-wrap').innerHTML = `<div class="error-bar">
        无法连接 Asana（错误：${e.message}）。<br>
        本地打开 HTML 文件会被浏览器 CORS 限制拦截。解决方法：<br>
        1. 上传到 <strong>GitHub Pages</strong> 后通过 https:// 链接访问（推荐）<br>
        2. 或安装 Chrome 扩展 <strong>CORS Unblock</strong> 后刷新
      </div>`;
      document.getElementById('sync-time').textContent = '同步失败';
    }
  }
}

function buildMatrix(tasks) {
  const m = {};
  tasks.forEach(t => {
    const p = parseTaskName(t.name);
    if (!p) return;
    const plat = normPlatform(p.platform);
    if (!plat) return;
    if (!m[p.event]) m[p.event] = {};
    m[p.event][plat] = { status: t.status };
  });
  return m;
}

function parseTaskName(name) {
  const match = name.match(/^【(.+?)】(.+?)｜(.+?)｜(.+)$/);
  if (!match) return null;
  return { event: match[1], platform: match[2], format: match[3] };
}

function normPlatform(p) {
  const map = { '小红书':'小红书','公众号':'公众号','微信公众号':'公众号','朋友圈':'朋友圈','微信朋友圈':'朋友圈','视频号':'视频号','LinkedIn':'LinkedIn','Instagram':'Instagram' };
  return map[p] || null;
}

function renderMatrix() {
  const events = Object.keys(matrix);
  if (!events.length) {
    document.getElementById('matrix-wrap').innerHTML = '<div class="empty-state">暂无数据，点击"↻ 刷新"加载 Asana 任务</div>';
    return;
  }
  const roleLabel = { review:'需 review', post:'竹子老师发送', notify:'通知即可', approve:'竹子老师 approve' };
  const roleClass = { review:'role-review', post:'role-post', notify:'role-notify', approve:'role-notify' };

  let html = '<div class="matrix-outer"><table><thead><tr><th></th>';
  PLATFORMS.forEach(p => {
    const meta = PLATFORM_META[p];
    html += `<th><div class="col-head"><span class="col-plat">${p}</span><span class="role-badge ${roleClass[meta.zzRole]}">${roleLabel[meta.zzRole]}</span></div></th>`;
  });
  html += '</tr></thead><tbody>';
  events.forEach(ev => {
    html += `<tr><td>${ev}</td>`;
    PLATFORMS.forEach(p => {
      const cell = matrix[ev] && matrix[ev][p];
      const meta = PLATFORM_META[p];
      if (cell) {
        const cls = STATUS_CLASS[cell.status] || 's-none';
        const lbl = STATUS_LABEL[cell.status] || cell.status;
        html += `<td><span class="status-pill ${cls}"><span class="dot"></span>${lbl}</span></td>`;
      } else {
        html += `<td><span class="status-pill s-none">—</span></td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('matrix-wrap').innerHTML = html;
}

function renderZZChecklist() {
  const toPost = [];
  const toReview = [];
  const toApprove = [];

  Object.entries(matrix).forEach(([ev, platforms]) => {
    Object.entries(platforms).forEach(([plat, cell]) => {
      if (cell.status !== 'review' && cell.status !== 'ready') return;
      const role = PLATFORM_META[plat] ? PLATFORM_META[plat].zzRole : 'review';
      const item = { ev, plat };
      if (role === 'post') toPost.push(item);
      else if (role === 'approve') toApprove.push(item);
      else toReview.push(item);
    });
  });

  const total = toPost.length + toReview.length + toApprove.length;
  const wrap = document.getElementById('zz-checklist');

  if (!total) {
    wrap.innerHTML = '';
    return;
  }

  const ts = Date.now();

  function buildGroup(items, type, title, countCls, platCls) {
    if (!items.length) return '';
    let h = `<div class="zz-group-head"><span class="zz-group-title">${title}</span><span class="zz-count ${countCls}">${items.length} 项</span></div>`;
    items.forEach((item, i) => {
      const id = `zz-${type}-${ts}-${i}`;
      h += `<div class="zz-item">
        <input type="checkbox" class="zz-checkbox" id="${id}" onchange="this.nextElementSibling.style.textDecoration=this.checked?'line-through':''; this.nextElementSibling.style.color=this.checked?'#aaa':'';">
        <label class="zz-item-text" for="${id}">${item.ev}</label>
        <span class="zz-plat ${platCls}">${item.plat}</span>
      </div>`;
    });
    return h;
  }

  let html = `<div class="zz-section">
    <div class="zz-header">
      <span class="zz-header-title">竹子老师待处理清单</span>
      <span class="zz-header-sub">共 ${total} 项</span>
    </div>`;
  html += buildGroup(toPost,    'post',    '📮 需竹子老师发送（朋友圈）', 'zz-count-post',    'zz-plat-post');
  html += buildGroup(toReview,  'review',  '👀 需竹子老师 review',         'zz-count-review',  'zz-plat-review');
  html += buildGroup(toApprove, 'approve', '✅ 需竹子老师 approve（Ins）',  'zz-count-approve', 'zz-plat-approve');
  html += '</div>';

  wrap.innerHTML = html;
}


  let total=0, pub=0, review=0, prod=0, planning=0, zz=0;
  Object.values(matrix).forEach(ev => {
    Object.values(ev).forEach(cell => {
      total++;
      if (cell.status==='pub') pub++;
      else if (cell.status==='review') { review++; zz++; }
      else if (cell.status==='prod') prod++;
      else if (cell.status==='planning') planning++;
      else if (cell.status==='ready') zz++;
    });
  });
  currentStats = { total, pub, review, prod, planning, zz };
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pub').textContent = pub;
  document.getElementById('stat-review').textContent = review;
  document.getElementById('stat-prod').textContent = prod;
  document.getElementById('stat-planning').textContent = planning;
  document.getElementById('stat-zz').textContent = zz;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab==='matrix'?1:2})`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  if (tab === 'history') renderHistory();
}

function openSnapForm() {
  switchTab('history');
  document.getElementById('snap-form-wrap').style.display = 'block';
  document.getElementById('snap-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('snap-text').focus();
}

function closeSnapForm() { document.getElementById('snap-form-wrap').style.display = 'none'; }

function saveSnapshot() {
  const type = document.getElementById('snap-type').value;
  const date = document.getElementById('snap-date').value;
  const text = document.getElementById('snap-text').value.trim();
  if (!text) { document.getElementById('snap-text').focus(); return; }
  const snap = { id: Date.now(), date, type, typeLabel: {daily:'日报',weekly:'周报',monthly:'月报'}[type], text, stats: {...currentStats} };
  const snaps = loadSnaps();
  snaps.unshift(snap);
  saveSnaps(snaps);
  document.getElementById('snap-text').value = '';
  closeSnapForm();
  renderHistory();
}

function deleteSnapshot(id) {
  if (!confirm('确认删除这条快照？')) return;
  saveSnaps(loadSnaps().filter(s => s.id !== id));
  renderHistory();
}

function renderHistory() {
  const snaps = loadSnaps();
  const wrap = document.getElementById('history-wrap');
  if (!snaps.length) {
    wrap.innerHTML = '<div class="empty-state"><div style="font-size:32px;margin-bottom:10px">📝</div><div>还没有快照记录</div><div style="font-size:12px;margin-top:6px;color:#bbb">点击"+ 记录快照"保存当前进度</div></div><button class="add-btn" onclick="openSnapForm()">+ 记录第一条快照</button>';
    return;
  }
  let html = '';
  snaps.forEach(s => {
    const d = new Date(s.date+'T12:00:00').toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    html += `<div class="snap-card">
      <div class="snap-head">
        <span class="snap-date">${d}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="snap-badge">${s.typeLabel}</span>
          <button class="snap-del" onclick="deleteSnapshot(${s.id})">✕</button>
        </div>
      </div>
      <div class="snap-body">${s.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
    if (s.stats) html += `<div class="snap-stats">
      <span>总任务 <strong>${s.stats.total}</strong></span>
      <span>已发布 <strong>${s.stats.pub}</strong></span>
      <span>待 review <strong>${s.stats.review}</strong></span>
      <span>制作中 <strong>${s.stats.prod}</strong></span>
      <span>计划中 <strong>${s.stats.planning || 0}</strong></span>
      <span>竹子老师待处理 <strong>${s.stats.zz}</strong></span>
    </div>`;
    html += '</div>';
  });
  html += '<button class="add-btn" onclick="openSnapForm()">+ 新增快照</button>';
  wrap.innerHTML = html;
}

function saveCache(tasks) { try { localStorage.setItem('smk_cache', JSON.stringify({tasks, ts:Date.now()})); } catch(e){} }
function loadCache() { try { const d=JSON.parse(localStorage.getItem('smk_cache')||'null'); if(!d||Date.now()-d.ts>86400000) return []; return d.tasks||[]; } catch(e){return[];} }
function loadSnaps() { try { return JSON.parse(localStorage.getItem('smk_snaps')||'[]'); } catch(e){return[];} }
function saveSnaps(s) { try { localStorage.setItem('smk_snaps', JSON.stringify(s)); } catch(e){} }

loadAsana();
